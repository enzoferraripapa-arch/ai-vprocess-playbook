name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run public safety gate
        run: python tools/check_public_safety.py

      - name: Render sample routing table
        run: python tools/render_routing.py examples/sample_routing.json

      - name: Check knowledge-pack updates
        run: python tools/knowledge_pack.py check --project examples/starter_project --packs examples/knowledge_packs

      - name: Plan knowledge-pack updates
        run: python tools/knowledge_pack.py plan --project examples/starter_project --packs examples/knowledge_packs

      - name: Create starter project
        run: python tools/create_starter_project.py --target /tmp/aivprocess-starter

      - name: Run starter safety gate
        run: python /tmp/aivprocess-starter/tools/check_public_safety.py

      - name: Compile tools
        run: python -m compileall -q tools
